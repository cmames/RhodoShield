<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FloraGuard Dashboard</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f0f4f8; 
            color: #102a43; 
            padding: 20px; 
            text-align: center; 
        }
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .card { 
            background: white; 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: left; 
            width: 280px; 
            margin: 15px; 
            border-top: 5px solid #243b53; 
        }
        .card.soil { border-top-color: #0b69a3; }
        .card.env { border-top-color: #0f8066; }
        .card.logs { width: 620px; border-top-color: #486581; }
        
        h1 { color: #0f2942; font-weight: 700; margin-bottom: 5px; }
        h2 { margin-top: 0; color: #334e68; font-size: 1.3em; }
        
        .metric { font-size: 1.1em; margin: 12px 0; display: flex; justify-content: space-between; }
        .val { font-weight: bold; color: #0b69a3; }
        .env .val { color: #0f8066; }
        
        .log-entry { 
            font-family: monospace; 
            background: #f8fafc; 
            padding: 8px; 
            margin: 0; 
            border-left: 4px solid #627d98; 
            font-size: 0.9em; 
            word-break: break-all; 
            text-align: left; 
        }
        /* Contextual Status Colors mapped by JavaScript client */
        .log-entry.info { border-color: #10b981; background: #ecfdf5; color: #065f46; }
        .log-entry.warn { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
        .log-entry.error { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        
        .status-badge { font-size: 0.85em; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        .status-badge.online { background: #d1fae5; color: #065f46; }
        .status-badge.offline { background: #fee2e2; color: #991b1b; }
        .footer { font-size: 0.85em; color: #627d98; }
    </style>
</head>
<body>
    <h1>FloraGuard Dashboard <span id="connection-status" class="status-badge offline"></span></h1>
    <div class="container">
        <div class="card soil">
            <h2>Humidité du sol</h2>
            <div class="metric"><span>Pourcentage :</span><span id="soil-pct" class="val">-- %</span></div>
            <canvas id="moisture-chart" width="280" height="60" style="border: 1px solid #e2e8f0; margin-top: 15px; border-radius: 6px; background: #f8fafc;"></canvas>
        </div>

        <div class="card env">
            <h2>Environnement</h2>
            <div class="metric"><span>Température :</span><span id="env-temp" class="val">-- °C</span></div>
            <div class="metric"><span>Humidité :</span><span id="env-hum" class="val">-- %</span></div>
            <div class="metric"><span>Pression :</span><span id="env-press" class="val">-- hPa</span></div>
        </div>

        <div class="card logs">
            <h2>Derniers événements</h2>
            <div id="logs-container">
                <div class="log-entry">En attente de synchronisation des données...</div>
            </div>
        </div>
    </div>

    <div class="footer">FloraGuard &bull; C. Mames &bull; GPL v3</div>

    <script>
        // Target API Endpoint matching your network configuration
        const API_URL = '/api/status';

        function drawChart(canvas, history) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            let txt=ctx.measureText("99%");
            txt.height=txt.fontBoundingBoxAscent+txt.fontBoundingBoxDescent;
            let startX = txt.width+4;

            // Clear previous canvas
            ctx.clearRect(0, 0, w, h);

            // Draw background grid (25%, 50%, 75%)
            ctx.strokeStyle = '#abbdd4';
            ctx.lineWidth = 0.5;
            let steps=h/txt.height;
            if (steps<2) steps=1;
            else if (steps<4) steps=2;
            else if (steps<5) steps=4;
            else if (steps<10) steps=5;
            else if (steps<20) steps=10;
            else steps=20;
            for (let l = 1; l < steps; l++) {
                let text=(l*(100/steps))+"%";
                if (l*(100/steps) < 10) text += " ";
                let yLine = h - (h * (l * (100/steps)) / 100);
                ctx.textBaseline = "middle";
                ctx.fillText(text,0,yLine);
                ctx.strokeText(text,0,yLine);
                ctx.beginPath();
                ctx.moveTo(0, yLine);
                ctx.lineTo(w, yLine);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(startX, 0);
            ctx.lineTo(startX, h);
            ctx.stroke();

            if (!history || history.length === 0) return;

            // Line config
            ctx.strokeStyle = '#0b69a3';
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.beginPath();

            // Map history on available width
            const stepX = (w - startX) / (history.length - 1);

            history.forEach((rawVal, index) => {
                const val=rawVal/2.55;
                const x = index * stepX + startX;
                const y = h - (h * val / 100);

                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.stroke();
        }

        function updateDashboard() {
            fetch(API_URL)
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(data => {
                    // Update Connection Badge
                    const badge = document.getElementById('connection-status');
                    badge.innerText = "🟢";
                    badge.className = "status-badge online";

                    // Hydrate Sensors Telemetry
                    document.getElementById('soil-pct').innerText = data.soil.moisture_pct.toFixed(2) + ' %';
                    document.getElementById('env-temp').innerText = data.environment.temperature_c.toFixed(2) + ' °C';
                    document.getElementById('env-hum').innerText = data.environment.humidity_pct.toFixed(2) + ' %';
                    document.getElementById('env-press').innerText = data.environment.pressure_hpa.toFixed(2) + ' hPa';

                    // Draw chart
                    drawChart(document.getElementById('moisture-chart'), data.moisture_history);

                    // Process and Color-code Logs array dynamically
                    const logsContainer = document.getElementById('logs-container');
                    logsContainer.innerHTML = ''; // Clear older views

                    data.logs.forEach(line => {
                        const entry = document.createElement('div');
                        entry.className = 'log-entry';
                        entry.innerText = '• ' + line;

                        // Conditional parsing to append the right contextual CSS rule
                        if (line.includes('[INF]')) {
                            entry.classList.add('info');
                        } else if (line.includes('[WRN]')) {
                            entry.classList.add('warn');
                        } else if (line.includes('[ERR]')) {
                            entry.classList.add('error');
                        }

                        logsContainer.appendChild(entry);
                    });
                })
                .catch(error => {
                    console.error('Fetch monitoring fallback sequence activated:', error);
                    const badge = document.getElementById('connection-status');
                    badge.innerText = "🔴";
                    badge.className = "status-badge offline";
                });
        }

        // Initial launch and interval cycle binding (5000ms)
        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
