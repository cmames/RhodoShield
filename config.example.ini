[moisture]
; Soil moisture calibration constants determined empirically
; To get this values run the component moisture_calibration
; Min value corresponds to maximum water saturation (100% wet)
; Max value corresponds to open air exposure (0% dry)
build_flags = 
    -D MOISTURE_ADC_MIN_WET=600
    -D MOISTURE_ADC_MAX_DRY=2800

[network]
build_flags =
    -D WIFI_SSID=\"YOUR_WIFI_SSID\"
    -D WIFI_PASSWORD=\"YOUR_WIFI_PASSWORD\"
    -D WIFI_MAX_RETRY=5
    -D MDNS_HOSTNAME=\"rhodoshield\"
    -D HTTP_API_URI=\"/api/status\"
    -D HTTP_API_PORT=80

[gpio]
build_flags = 
    -D MOISTURE_ADC_CHANNEL=6 ; ADC_CHANNEL_6
    -D MOISTURE_ADC_UNIT=0 ; ADC_UNIT_1 is 0
    -D I2C_MASTER_SDA_IO=25
    -D I2C_MASTER_SCL_IO=26
    -D I2C_MASTER_NUM=0 ; I2C_NUM_0
    -D GPIO_PUMP_OUTPUT=27
    -D GPIO_LED_BLUE_OUTPUT=14 ; Wifi connected
    -D GPIO_LED_YELLOW_OUTPUT=12 ; Warning dry
    -D GPIO_LED_RED_OUTPUT=13 ; Alert or error

[agriculture]
; Parameters to fine-tune irrigation based on plant needs and pump flow rate
build_flags =
    -D SOIL_MOISTURE_CRITICAL_HIGH=80.0f
    -D SOIL_MOISTURE_CRITICAL_LOW=20.0f
    -D IRRIGATION_PUMP_ON_MS=10000 ; time for watering
    -D IRRIGATION_PUMP_OFF_MS=50000 ; time for infiltration

[time]
; Timezone and daylight restriction settings (24h format)
; Change this for your region
; See list of timezone strings https://github.com/nayarsystems/posix_tz_db/blob/master/zones.csv
build_flags =
    -D SNTP_TIMEZONE=\"CET-1CEST,M3.5.0,M10.5.0/3\"
    -D DAYLIGHT_START_HOUR=8
    -D DAYLIGHT_END_HOUR=18